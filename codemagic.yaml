workflows:

  android-release:
    name: Android (release)
    max_build_duration: 30
    environment:
      flutter: stable
      android_signing:
        - project_o_keystore
    scripts:
      - name: Get dependencies
        working_directory: mobile
        script: flutter pub get
      - name: Build AAB
        working_directory: mobile
        script: flutter build appbundle --release
    artifacts:
      - mobile/build/**/outputs/bundle/**/*.aab
      - mobile/build/**/outputs/apk/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

  android-debug:
    name: Android (debug APK)
    max_build_duration: 20
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        working_directory: mobile
        script: flutter pub get
      - name: Build debug APK
        working_directory: mobile
        script: flutter build apk --debug
    artifacts:
      - mobile/build/**/outputs/apk/debug/*.apk

  ios-release:
    name: iOS (release)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.projecto.stream
    scripts:
      - name: Get dependencies
        working_directory: mobile
        script: flutter pub get
      - name: Install pods
        working_directory: mobile/ios
        script: pod install
      - name: Build iOS
        working_directory: mobile
        script: |
          flutter build ios --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - mobile/build/ios/iphoneos/*.app
      - "*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
