name: project_o_stream
description: Native mobile camera sender for Project O Stream. Mobile development stays on main; this branch is reserved for the Tauri + Svelte desktop controller.
publish_to: none
version: 3.0.0+300

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  camera: ^0.12.0+1
  flutter:
    sdk: flutter
  gal: ^2.3.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
