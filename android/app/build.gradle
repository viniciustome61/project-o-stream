plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.projecto.stream'
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    defaultConfig {
        applicationId 'com.projecto.stream'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
    }

    packaging {
        jniLibs {
            pickFirsts += ['**/libcrypto.so', '**/libssl.so']
        }
    }

    def cmKeystorePath = System.getenv('CM_KEYSTORE_PATH')
    def hasCodemagicSigning = cmKeystorePath != null &&
            !cmKeystorePath.isBlank() &&
            System.getenv('CM_KEYSTORE_PASSWORD') != null &&
            System.getenv('CM_KEY_ALIAS') != null &&
            System.getenv('CM_KEY_PASSWORD') != null

    signingConfigs {
        release {
            if (hasCodemagicSigning) {
                storeFile file(cmKeystorePath)
                storePassword System.getenv('CM_KEYSTORE_PASSWORD')
                keyAlias System.getenv('CM_KEY_ALIAS')
                keyPassword System.getenv('CM_KEY_PASSWORD')
            }
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
        }

        release {
            if (hasCodemagicSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

def staleFlutterRegistrant = layout.projectDirectory.file('src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java')
def repoFlutterRoot = file('../..')
def mobileFlutterRoot = file('../../mobile')
def rootPackageConfig = file('../../.dart_tool/package_config.json')
def mobilePackageConfig = file('../../mobile/.dart_tool/package_config.json')

tasks.register('deleteStaleFlutterRegistrant') {
    doLast {
        staleFlutterRegistrant.asFile.delete()
    }
}
tasks.matching { it.name.startsWith('generate') && it.name.contains('PluginRegistrant') }.configureEach {
    tasks.named('deleteStaleFlutterRegistrant').configure {
        mustRunAfter it
    }
}
tasks.matching { it.name.startsWith('compile') }.configureEach {
    dependsOn tasks.named('deleteStaleFlutterRegistrant')
}
tasks.register('mirrorFlutterBuildOutputs') {
    doLast {
        def rootOutputs = new File(repoFlutterRoot, 'build/app/outputs')
        def mobileOutputs = new File(mobileFlutterRoot, 'build/app/outputs')
        if (rootOutputs.exists()) {
            copy {
                from rootOutputs
                into mobileOutputs
            }
        }
        if (mobileOutputs.exists()) {
            copy {
                from mobileOutputs
                into rootOutputs
            }
        }
    }
}
tasks.matching { it.name.startsWith('bundle') || it.name.startsWith('assemble') }.configureEach {
    finalizedBy tasks.named('mirrorFlutterBuildOutputs')
}

repositories {
    google()
    mavenCentral()
}

flutter {
    source rootPackageConfig.exists() || !mobilePackageConfig.exists() ? '../..' : '../../mobile'
}

dependencies {
    implementation 'androidx.core:core-ktx:1.17.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    implementation 'io.github.thibaultbee.streampack:streampack-core:3.1.2'
    implementation 'io.github.thibaultbee.streampack:streampack-ui:3.1.2'
    implementation 'io.github.thibaultbee.streampack:streampack-srt:3.1.2'
}
