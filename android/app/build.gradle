plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.projecto.stream'
    compileSdk 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    defaultConfig {
        applicationId 'com.projecto.stream'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
    }

    packaging {
        jniLibs {
            pickFirsts += ['**/libcrypto.so', '**/libssl.so']
        }
    }

    def cmKeystorePath = System.getenv('CM_KEYSTORE_PATH')
    def hasCodemagicSigning = cmKeystorePath != null &&
            !cmKeystorePath.isBlank() &&
            System.getenv('CM_KEYSTORE_PASSWORD') != null &&
            System.getenv('CM_KEY_ALIAS') != null &&
            System.getenv('CM_KEY_PASSWORD') != null

    signingConfigs {
        release {
            if (hasCodemagicSigning) {
                storeFile file(cmKeystorePath)
                storePassword System.getenv('CM_KEYSTORE_PASSWORD')
                keyAlias System.getenv('CM_KEY_ALIAS')
                keyPassword System.getenv('CM_KEY_PASSWORD')
            }
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
        }

        release {
            if (hasCodemagicSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    google()
    mavenCentral()
}

flutter {
    def rootFlutterProject = file('../..')
    def mobileFlutterProject = file('../../mobile')
    source mobileFlutterProject.exists() &&
            file('../../mobile/.dart_tool/package_config.json').exists() &&
            !file('../../.dart_tool/package_config.json').exists()
            ? '../../mobile'
            : '../..'
}

dependencies {
    implementation 'androidx.core:core-ktx:1.15.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    implementation 'io.github.thibaultbee.streampack:streampack-core:3.1.2'
    implementation 'io.github.thibaultbee.streampack:streampack-ui:3.1.2'
    implementation 'io.github.thibaultbee.streampack:streampack-srt:3.1.2'
}
