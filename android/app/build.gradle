plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.projecto.stream'
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    defaultConfig {
        applicationId 'com.projecto.stream'
        minSdk 26
        targetSdk 35
        versionCode 300
        versionName '3.0.0'
    }

    packaging {
        jniLibs {
            pickFirsts += ['**/libcrypto.so', '**/libssl.so']
        }
    }

    signingConfigs {
        release {
            // Signing secrets should be provisioned via GitHub Actions Secrets or local properties
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
        }

        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

def repoFlutterRoot = file('../..')

tasks.register('prepareFlutterBuildDirectory') {
    doLast {
        new File(repoFlutterRoot, 'build').mkdirs()
    }
}

tasks.matching { it.name.startsWith('compileFlutterBuild') }.configureEach {
    dependsOn tasks.named('prepareFlutterBuildDirectory')
}

repositories {
    google()
    mavenCentral()
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.core:core-ktx:1.17.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    implementation 'io.github.thibaultbee.streampack:streampack-core:3.1.2'
    implementation 'io.github.thibaultbee.streampack:streampack-ui:3.1.2'
    implementation 'io.github.thibaultbee.streampack:streampack-srt:3.1.2'
}
