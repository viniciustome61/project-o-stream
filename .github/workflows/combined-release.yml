name: Combined Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: false
        default: ''

jobs:
  flutter-android:
    name: Flutter Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --debug
      - name: Find and Move APK
        run: |
          mkdir -p final-apk
          find . -name "*.apk" -print -exec cp {} final-apk/ \;
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-debug
          path: final-apk/*.apk

  flutter-ios:
    name: Flutter iOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true
      - name: Build iOS Simulator
        run: |
          flutter pub get
          flutter build ios --simulator --debug --no-codesign
      - name: Zip Simulator App
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../../flutter-ios-simulator.zip Runner.app
      - name: Upload Simulator Zip
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-simulator
          path: flutter-ios-simulator.zip

  tauri-desktop:
    name: Tauri Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        working-directory: desktop
        run: npm install
      - name: Build Tauri
        working-directory: desktop
        run: npm run tauri build -- --debug
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-debug
          path: desktop/src-tauri/target/debug/bundle/msi/*.msi

  github-release:
    name: Create GitHub Release
    needs: [flutter-android, flutter-ios, tauri-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: flutter-android-debug
          path: dist/android

      - name: Download iOS Simulator
        uses: actions/download-artifact@v4
        with:
          name: flutter-ios-simulator
          path: dist/ios

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: tauri-windows-debug
          path: dist/windows

      - name: Determine tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Release ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/android/*.apk
            dist/ios/*.zip
            dist/windows/*.msi
