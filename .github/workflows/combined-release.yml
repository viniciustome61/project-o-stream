name: Combined Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.3.0. Got: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  flutter-android:
    name: Flutter Android
    needs: release-meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-meta.outputs.tag }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --debug \
            || test -f android/app/build/outputs/flutter-apk/app-debug.apk \
            || test -f android/app/build/outputs/apk/debug/app-debug.apk
      - name: Find and stage APK
        run: |
          mkdir -p final-apk
          APK=$(find . -name "*.apk" ! -path "*/test*" ! -path "*intermediates*" | head -1)
          echo "Found APK: $APK"
          if [ -z "$APK" ]; then echo "No APK found"; exit 1; fi
          cp "$APK" final-apk/stream-debug.apk
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: flutter-android-debug
          if-no-files-found: error
          path: final-apk/stream-debug.apk

  flutter-ios:
    name: Flutter iOS
    needs: release-meta
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-meta.outputs.tag }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true
      - name: Install CocoaPods dependencies
        run: |
          flutter pub get
          cd ios && pod install
      - name: Build iOS device (release, unsigned)
        run: flutter build ios --release --no-codesign
      - name: Package unsigned release IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r stream-unsigned.ipa Payload
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v7
        with:
          name: ios-unsigned-ipa
          if-no-files-found: error
          path: stream-unsigned.ipa

  tauri-desktop:
    name: Tauri Desktop (Windows)
    needs: release-meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-meta.outputs.tag }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        working-directory: desktop
        run: npm install
      - name: Build Tauri
        working-directory: desktop
        run: npm run tauri build -- --debug
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v7
        with:
          name: tauri-windows-debug
          if-no-files-found: error
          path: desktop/src-tauri/target/debug/bundle/msi/*.msi

  github-release:
    name: Create GitHub Release
    needs: [release-meta, flutter-android, flutter-ios, tauri-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-meta.outputs.tag }}

      - name: Download Android APK
        uses: actions/download-artifact@v8
        with:
          name: flutter-android-debug
          path: dist/android

      - name: Download iOS unsigned IPA
        uses: actions/download-artifact@v8
        with:
          name: ios-unsigned-ipa
          path: dist/ios

      - name: Download Windows MSI
        uses: actions/download-artifact@v8
        with:
          name: tauri-windows-debug
          path: dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          name: Release ${{ needs.release-meta.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/android/*.apk
            dist/ios/*.ipa
            dist/windows/*.msi
