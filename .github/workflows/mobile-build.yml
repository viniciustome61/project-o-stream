name: Mobile Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true

      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS device app (release, unsigned)
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign --verbose 2>&1 | tail -80

          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -100

      - name: Package unsigned release IPA
        run: |
          set -e
          mkdir -p Payload

          APP_PATH="$(find ios/build/DerivedData/Build/Products build/ios/iphoneos -path '*/Runner.app' -type d 2>/dev/null | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find Runner.app in build output"
            find . -name "Runner.app" -type d 2>/dev/null | head -5
            exit 1
          fi

          echo "Packaging $APP_PATH"
          if [ ! -f "$APP_PATH/Assets.car" ]; then
            echo "ERROR: $APP_PATH is missing Assets.car"
            find ios/build/DerivedData/Build/Products build/ios/iphoneos -path '*/Runner.app/Assets.car' -type f 2>/dev/null
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r stream-unsigned.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-unsigned-ipa
          if-no-files-found: error
          path: stream-unsigned.ipa

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build debug APK
        run: |
          flutter build apk --debug --verbose 2>&1 | tail -300
          # If flutter build didn't find the APK, try direct Gradle
          if [ ! -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
            echo "Flutter APK not at expected path, trying Gradle directly..."
            cd android && ./gradlew assembleDebug --stacktrace 2>&1 | tail -200
          fi

      - name: Locate APK
        run: |
          echo "--- APK search ---"
          find . -name "*.apk" -type f 2>/dev/null | head -10 || echo "No APK found"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            android/app/build/outputs/apk/debug/app-debug.apk
