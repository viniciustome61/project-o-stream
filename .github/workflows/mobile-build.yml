name: Mobile Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true

      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS device app (release, unsigned) with Xcode
        working-directory: ios
        run: |
          pod install --repo-update
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -arch arm64 -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO 2>&1 | grep -i "error\|warning\|build\|fail" | head -30

      - name: Package unsigned release IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Release-iphoneos/Runner.app Payload/
          zip -r stream-unsigned.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-unsigned-ipa
          if-no-files-found: error
          path: stream-unsigned.ipa
