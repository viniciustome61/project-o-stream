name: Mobile Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true

      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS device app (release, unsigned)
        run: |
          # First, prepare the Flutter build
          flutter build ios --release --no-codesign --verbose 2>&1 | tail -20
          
      - name: Complete iOS build with xcodebuild
        working-directory: ios
        run: |
          # Use xcodebuild to ensure complete build with asset catalog compilation
          # CODE_SIGN_IDENTITY="" skips code signing but completes the build
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tail -50

      - name: Package unsigned release IPA
        run: |
          mkdir -p Payload
          # Use the app from xcodebuild DerivedData if available, otherwise use flutter build
          if [ -d "ios/build/DerivedData/Build/Products/Release-iphoneos/Runner.app" ]; then
            cp -r ios/build/DerivedData/Build/Products/Release-iphoneos/Runner.app Payload/
          else
            cp -r build/ios/iphoneos/Runner.app Payload/
          fi
          zip -r stream-unsigned.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-unsigned-ipa
          if-no-files-found: error
          path: stream-unsigned.ipa
