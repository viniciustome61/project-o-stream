name: Mobile Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true

      - name: Get dependencies
        run: |
          mkdir -p build
          flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: List Android outputs
        if: always()
        run: find build android/app/build -type f \( -name "*.aab" -o -name "*.apk" \) -print 2>/dev/null || true

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          if-no-files-found: error
          path: |
            build/app/outputs/bundle/debug/*.aab
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/bundle/debug/*.aab
            android/app/build/outputs/apk/debug/*.apk

  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS simulator app
        run: flutter build ios --simulator --debug

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-debug
          if-no-files-found: error
          path: build/ios/iphonesimulator/Runner.app
