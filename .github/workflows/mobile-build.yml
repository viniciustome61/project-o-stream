name: Mobile Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true

      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS device app (release, unsigned)
        run: |
          # Use xcodebuild directly with configuration to ensure Assets.car is compiled
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -100

      - name: Package unsigned release IPA
        run: |
          mkdir -p Payload
          # Use the properly built app from xcodebuild
          if [ -d "ios/build/DerivedData/Build/Products/Release-iphoneos/Runner.app" ]; then
            cp -r ios/build/DerivedData/Build/Products/Release-iphoneos/Runner.app Payload/
          elif [ -d "build/ios/iphoneos/Runner.app" ]; then
            cp -r build/ios/iphoneos/Runner.app Payload/
          else
            echo "ERROR: Could not find Runner.app in build output"
            find . -name "Runner.app" -type d 2>/dev/null | head -5
            exit 1
          fi
          zip -r stream-unsigned.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-unsigned-ipa
          if-no-files-found: error
          path: stream-unsigned.ipa
