name: Mobile Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          cache: true

      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS device app (release, unsigned)
        run: flutter build ios --release --no-codesign 2>&1 | tail -20

      - name: Package unsigned release IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r stream-unsigned.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-unsigned-ipa
          if-no-files-found: error
          path: stream-unsigned.ipa
